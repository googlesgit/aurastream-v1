<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraStream // Focus Environment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>AuraStream</h1>
            <p>Design your focus environment.</p>
        </header>

        <div class="mixer-grid">
            <div class="sound-card" data-sound="rain">
                <div class="icon">🌧️</div>
                <h3>Rain</h3>
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
                <audio id="rain-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio> 
                </div>

            <div class="sound-card" data-sound="cafe">
                <div class="icon">☕</div>
                <h3>Café</h3>
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
                <audio id="cafe-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
            </div>

            <div class="sound-card" data-sound="forest">
                <div class="icon">🌲</div>
                <h3>Forest</h3>
                <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.5">
                <audio id="forest-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"></audio>
            </div>
        </div>

        <div class="master-controls">
            <button id="masterPlay">Start Session</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
